services:
  postgres:
    image: postgres:16
    container_name: whatfitsnow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: whatfitsnow
      POSTGRES_USER: whatfitsnow
      POSTGRES_PASSWORD: whatfitsnow
    volumes:
      - whatfitsnow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatfitsnow -d whatfitsnow"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  whatfitsnow_pg_data:

