spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/whatfitsnow
    username: whatfitsnow
    password: whatfitsnow

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  security:
    jwt:
      issuer: whatfitsnow-local
      # Example: openssl rand -base64 48
      secret: change-me-change-me-change-me-change-me-change-me
      access-token-ttl: PT2H

